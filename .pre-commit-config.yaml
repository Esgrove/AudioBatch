exclude: ^(.idea|.vscode)

# Run with prek (https://prek.j178.dev), a fast drop-in replacement for pre-commit.
# Hooks with the same priority run concurrently, lower priority values run first.

repos:
  - repo: builtin
    # Fast Rust implementations of pre-commit-hooks bundled with prek
    hooks:
      - id: check-added-large-files
        priority: 1
      - id: check-case-conflict
        priority: 1
      - id: check-json
        priority: 1
      - id: check-merge-conflict
        priority: 1
      - id: check-toml
        priority: 1
      - id: check-yaml
        args: [--allow-multiple-documents]
        priority: 1
      - id: end-of-file-fixer
        priority: 1
      - id: mixed-line-ending
        priority: 1
      - id: trailing-whitespace
        priority: 1

  - repo: local
    hooks:
      - id: clang-format
        name: C++ Clang-format
        description: Run clang-format on files included in the commit.
        entry: clang-format -i --style=file
        types_or: [c, c++]
        language: system
        files: ^cpp/
        priority: 1
